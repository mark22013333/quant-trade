# Insert this block before the existing catch-all `location /` blocks for
# cheng.tplinkdns.com. It intentionally serves Quant-Trade under /quant-trade/
# so existing root-site traffic keeps going to the current application.
#
# Security:
# - Basic Auth credentials live in /etc/nginx/.htpasswd, never in this file.
# - Nginx passes the Basic Auth user to FastAPI with X-Authenticated-User.
# - FastAPI accepts that header only when CONTROL_PANEL_TRUST_PROXY_AUTH=1 and
#   the request comes from loopback.
# - If this backend VM receives traffic through a central gateway, the allow
#   list below sees the gateway/LAN source IP unless real_ip is configured at
#   the trusted gateway boundary.

location = /quant-trade {
    return 301 /quant-trade/;
}

location ^~ /quant-trade/ {
    satisfy all;
    allow 127.0.0.1;
    allow ::1;
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    deny all;

    auth_basic "Quant-Trade Control Panel";
    auth_basic_user_file /etc/nginx/.htpasswd;

    proxy_pass http://127.0.0.1:8766/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /quant-trade;
    proxy_set_header X-Authenticated-User $remote_user;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 300;
}
