name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip install pytest pytest-cov ruff alembic httpx
      - name: Run tests
        run: python -m pytest -q
      - name: Ruff
        run: python -m ruff check . || echo "::warning::Ruff reported issues; keeping this advisory until the backlog is cleaned up."
      - name: Dependency vulnerability scan
        run: |
          python -m pip install pip-audit
          python -m pip_audit || echo "::warning::pip-audit reported vulnerabilities; keeping this advisory until dependencies are upgraded."
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v3
